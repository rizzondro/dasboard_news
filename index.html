<!DOCTYPE html>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<link rel="manifest" href="manifest.json">
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Messina Intelligence Center</title>
    <style>
        :root { --bg: #0b0f19; --card: #131a2c; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; margin: 0; }
        
        /* Pannello Filtri */
        #controls { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input { background: #0b0f19; border: 1px solid #334155; color: white; padding: 10px; border-radius: 5px; flex-grow: 1; min-width: 250px; }
        .tag { padding: 6px 14px; background: #334155; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.2s; border: 1px solid transparent; }
        .tag.active { background: #60a5fa; color: white; border-color: #93c5fd; }

        /* Griglia migliorata per una distribuzione bilanciata */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 20px; 
            max-width: 1800px; 
            margin: 0 auto; 
        }
        
        .box { 
            background: var(--card); 
            border-radius: 12px; 
            height: 450px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid #1e293b; 
            border-top: 8px solid; /* Il colore viene iniettato via JS */
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        h3 { margin: 0; padding: 14px; font-size: 14px; text-transform: uppercase; text-align: center; color: #fff; font-weight: bold; }
        .scroll { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .link { display: block; padding: 8px 12px; color: #cbd5e1; text-decoration: none; font-size: 13.5px; border-bottom: 1px solid #1e293b; }
        .link:hover { background: rgba(255,255,255,0.06); color: #fff; border-radius: 4px; }
    </style>
</head>
<body>

<div id="controls">
    <input type="text" id="searchInput" placeholder="Cerca parole chiave (es: carabinieri, attentato)...">
    <div id="filters">
        <span class="tag" onclick="toggleTag(this, 'cronaca')">Cronaca</span>
        <span class="tag" onclick="toggleTag(this, 'politica')">Politica</span>
        <span class="tag" onclick="toggleTag(this, 'attualità')">Attualità</span>
        <span class="tag" onclick="toggleTag(this, 'sport')">Sport</span>
    </div>
</div>

<div class="grid" id="dashboard"></div>

<script>
    // Abbiamo aggiunto la proprietà 'categories' a ogni feed
    const feeds = [
        { name: "Gazzetta del Sud", url: "https://rss.app/feeds/CoRPBuXc0mjm6PfQ.xml", color: "#3b82f6", cats: ["cronaca", "attualità"] },
        { name: "La Sicilia", url: "https://rss.app/feeds/wBVSQuYUYKBGMy4d.xml", color: "#ef4444", cats: ["cronaca", "attualità"] },
        { name: "Tempo Stretto", url: "https://rss.app/feeds/tx0gV3RjfVb9GrDS.xml", color: "#10b981", cats: ["cronaca", "attualità"] },
        { name: "MessinaToday", url: "https://rss.app/feeds/tb9TAqkjUG05GMBW.xml", color: "#f59e0b", cats: ["cronaca", "attualità"] },
        { name: "ReggioToday", url: "https://rss.app/feeds/tPfIewIcPkLREAhi.xml", color: "#8b5cf6", cats: ["cronaca", "attualità"] },
        { name: "Giornale di Sicilia", url: "https://rss.app/feeds/taTCc6n6ERg1MnVQ.xml", color: "#ec4899", cats: ["cronaca", "politica"] },
        { name: "Extra", url: "https://rss.app/feeds/tBZW7i1Y1EqrhaNK.xml", color: "#64748b", cats: ["attualità"] }
    ];

    let allNews = [];

    async function initDashboard() {
        const grid = document.getElementById('dashboard');
        feeds.forEach(feed => {
            const div = document.createElement('div');
            div.className = 'box';
            div.style.borderTopColor = feed.color;
            div.innerHTML = `<h3 style="background:${feed.color}44">${feed.name}</h3><div class="scroll" id="${feed.name}">Caricamento...</div>`;
            grid.appendChild(div);
        });

        const promises = feeds.map(feed => 
            fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed.url))
                .then(r => r.json())
                .then(data => {
                    if (data.items) {
                        data.items.forEach(item => {
                            item.source = feed.name;
                            item.tags = feed.cats; // Assegniamo le categorie del feed alla notizia
                            allNews.push(item);
                        });
                    }
                })
        );

        await Promise.all(promises);
        renderNews();
    }

    function renderNews() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const activeTags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.innerText.toLowerCase());

        feeds.forEach(feed => {
            const container = document.getElementById(feed.name);
            container.innerHTML = "";
            
            const filtered = allNews.filter(n => n.source === feed.name).filter(n => {
                const matchQuery = n.title.toLowerCase().includes(query);
                // Controllo preciso: la categoria deve essere nell'array 'tags' della notizia
                const matchTag = activeTags.length === 0 || activeTags.some(t => n.tags.includes(t));
                return matchQuery && matchTag;
            });

            if(filtered.length === 0) container.innerHTML = "<div style='padding:10px; font-size:12px; opacity:0.5;'>Nessun risultato</div>";
            filtered.forEach(item => {
                container.innerHTML += `<a class="link" href="${item.link}" target="_blank">${item.title}</a>`;
            });
        });
    }

    function toggleTag(el, tag) {
        el.classList.toggle('active');
        renderNews();
    }

    document.getElementById('searchInput').addEventListener('input', renderNews);
    initDashboard();
</script>
</body>
</html>
