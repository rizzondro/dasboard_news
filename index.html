<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messina News App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        :root { --bg: #0b0f19; --card: #131a2c; --text: #e2e8f0; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; overflow: hidden; }
        
        /* Pannello Filtri */
        #controls { background: #1e293b; padding: 10px; display: flex; gap: 5px; flex-wrap: wrap; z-index: 10; position: relative; }
        input { background: #0b0f19; border: 1px solid #334155; color: white; padding: 8px; border-radius: 5px; flex-grow: 1; }
        .tag { padding: 5px 10px; background: #334155; border-radius: 15px; cursor: pointer; font-size: 11px; color: #fff; }
        .tag.active { background: #60a5fa; }

        /* Slider Swiper */
        .swiper { width: 100%; height: calc(100vh - 60px); }
        .swiper-slide { display: flex; flex-direction: column; }
        
        .box { background: var(--card); height: 100%; display: flex; flex-direction: column; border-top: 8px solid; }
        h3 { margin: 0; padding: 15px; text-transform: uppercase; text-align: center; color: #fff; font-size: 16px; }
        .scroll { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .link { display: block; padding: 12px; color: #cbd5e1; text-decoration: none; font-size: 15px; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body>

<div id="controls">
    <input type="text" id="searchInput" placeholder="Cerca...">
    <span class="tag" onclick="toggleTag(this, 'cronaca')">Cronaca</span>
    <span class="tag" onclick="toggleTag(this, 'politica')">Politica</span>
</div>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="dashboard"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const feeds = [
        { name: "Gazzetta del Sud", url: "https://rss.app/feeds/CoRPBuXc0mjm6PfQ.xml", color: "#3b82f6", cats: ["cronaca"] },
        { name: "La Sicilia", url: "https://rss.app/feeds/wBVSQuYUYKBGMy4d.xml", color: "#ef4444", cats: ["cronaca"] },
        { name: "Tempo Stretto", url: "https://rss.app/feeds/tx0gV3RjfVb9GrDS.xml", color: "#10b981", cats: ["cronaca"] },
        { name: "MessinaToday", url: "https://rss.app/feeds/tb9TAqkjUG05GMBW.xml", color: "#f59e0b", cats: ["cronaca"] },
        { name: "ReggioToday", url: "https://rss.app/feeds/tPfIewIcPkLREAhi.xml", color: "#8b5cf6", cats: ["cronaca"] },
        { name: "Giornale di Sicilia", url: "https://rss.app/feeds/taTCc6n6ERg1MnVQ.xml", color: "#ec4899", cats: ["politica"] },
        { name: "Extra", url: "https://rss.app/feeds/tBZW7i1Y1EqrhaNK.xml", color: "#64748b", cats: ["attualità"] }
    ];

    let allNews = [];
    let swiper = null;

    async function initDashboard() {
        const grid = document.getElementById('dashboard');
        
        feeds.forEach(feed => {
            const div = document.createElement('div');
            div.className = 'swiper-slide';
            div.innerHTML = `
                <div class="box" style="border-top-color: ${feed.color}">
                    <h3 style="background:${feed.color}33">${feed.name}</h3>
                    <div class="scroll" id="${feed.name}">Caricamento...</div>
                </div>`;
            grid.appendChild(div);
        });

        const promises = feeds.map(feed => 
            fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed.url))
                .then(r => r.json())
                .then(data => {
                    if (data.items) {
                        data.items.forEach(item => {
                            item.source = feed.name;
                            item.tags = feed.cats;
                            allNews.push(item);
                        });
                    }
                })
        );

        await Promise.all(promises);
        renderNews();
        
        swiper = new Swiper(".mySwiper", { effect: "slide", grabCursor: true });
    }

    function renderNews() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const activeTags = Array.from(document.querySelectorAll('.tag.active')).map(t => t.innerText.toLowerCase());

        feeds.forEach(feed => {
            const container = document.getElementById(feed.name);
            container.innerHTML = "";
            allNews.filter(n => n.source === feed.name).filter(n => {
                const matchQuery = n.title.toLowerCase().includes(query);
                const matchTag = activeTags.length === 0 || activeTags.some(t => n.tags.includes(t));
                return matchQuery && matchTag;
            }).forEach(item => {
                container.innerHTML += `<a class="link" href="${item.link}" target="_blank">${item.title}</a>`;
            });
        });
    }

    function toggleTag(el, tag) {
        el.classList.toggle('active');
        renderNews();
    }

    document.getElementById('searchInput').addEventListener('input', renderNews);
    initDashboard();
</script>
</body>
</html>
